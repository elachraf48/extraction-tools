<!DOCTYPE html>
<html>

<head>
  <!-- Redirect -->

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GM8HCQFNXP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-GM8HCQFNXP');

  <title>Multi-line Time Converter | mailer48</title>

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #020617;
      color: #38bdf8;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
    }

    input {
      background: #020617;
      color: white;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px;
      width: 100px;
    }

    button {
      border-radius: 10px;
      padding: 10px 15px;
    }

    .btn-main {
      background: #38bdf8;
      border: none;
      color: black;
      font-weight: 600;
    }

    .btn-copy {
      background: #22c55e;
      border: none;
      color: black;
      font-weight: 600;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <h2><i class="fa-solid fa-pen"></i> Input</h2>
      <textarea id="input" placeholder="#liste1 5:09 pm 02/03/2026"></textarea>
    </div>

    <div class="card">
      <label>+ Hours:</label>
      <input type="number" id="hours" value="28">
      <br><br>
      <button class="btn-main" onclick="processLines()"><i class="fa-solid fa-gear"></i> Convert</button>
      <button class="btn-copy" onclick="copyOutput()"><i class="fa-solid fa-copy"></i> Copy</button>
    </div>

    <div class="card">
      <h2><i class="fa-solid fa-terminal"></i> Output</h2>
      <textarea id="output" readonly></textarea>
    </div>

  </div>

<script>
function convertTo24h(timeStr) {
  let time = timeStr.trim().toLowerCase();
  let isPM = time.includes('pm');
  let isAM = time.includes('am');

  time = time.replace(/am|pm/, '').trim();
  let [hours, minutes] = time.split(':').map(Number);

  if (isPM && hours < 12) hours += 12;
  if (isAM && hours === 12) hours = 0;

  return `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}`;
}

function processLines() {
  const input = document.getElementById('input').value.split('\n');
  let output = [];
  let addHours = parseInt(document.getElementById('hours').value) || 0;

  output.push("🚀 You can start sending in this liste at this time:");

  input.forEach((line) => {
    if (!line.trim()) return;

    let match = line.match(/(#liste\d+)\s+([\d: ]+(?:am|pm)?)\s+(\d{2}\/\d{2}\/\d{4})/i);

    if (!match) {
      output.push('❌ Invalid format: ' + line);
      return;
    }

    let label = match[1];
    let timeRaw = match[2];
    let date = match[3];

    let time24 = convertTo24h(timeRaw);

    let [h, m] = time24.split(':').map(Number);
    let dateObj = new Date(date.split('/').reverse().join('-'));
    dateObj.setHours(h + addHours, m);

    let finalHours = String(dateObj.getHours()).padStart(2,'0');
    let finalMinutes = String(dateObj.getMinutes()).padStart(2,'0');

    let d = String(dateObj.getDate()).padStart(2,'0');
    let mo = String(dateObj.getMonth() + 1).padStart(2,'0');
    let y = dateObj.getFullYear();

    output.push(`${label} ${finalHours}:${finalMinutes} ${d}/${mo}/${y}`);
  });

  document.getElementById('output').value = output.join('\n');
}

function copyOutput() {
  const output = document.getElementById('output');
  output.select();
  document.execCommand('copy');
  alert('Copied!');
}
</script>

</body>
</html>
